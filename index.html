<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
  </head>
  <body class="page">
    <div class="header">
      <img src="./eisenhower-matrix.jpg" class="header-img">
      <a class="more-info"
          href="https://goal-life.com/page/method/matrix-eisenhower">
          Want more details?
      </a>
    </div>
    <div class="main">
      <p id="adding-tasks-section">
        <label for="new-task" class="adding-tasks-section-title">Add Item</label>
        <div class="task-row">
          <input id="new-task"class="task-name task-name-input" type="text">
          <button class="btn add-btn">Add</button>
        </div>
      </p>
      <h3 class="tasks-list-title">Todo</h3>
      <ul id="incomplete-tasks-list">
        <li class="task">
          <input type="checkbox" class="tasks-list-checkbox">
          <label class="task-name task-name-label">Pay Bills</label>
          <input type="text" class="task-name  task-name-input">
          <button class="btn edit-btn">Edit</button>
          <button class="btn delete-btn">
            <img src="./remove.svg" class="delete-btn-img">
          </button>
        </li>
        <li class="task edit-mode">
          <input type="checkbox" class="tasks-list-checkbox">
          <label class="task-name task-name-label">Go Shopping</label>
          <input type="text" value="Go Shopping" class="task-name  task-name-input">
          <button class="btn edit-btn">Save</button>
          <button class="btn delete-btn">
            <img src="./remove.svg" class="delete-btn-img">
          </button>
        </li>
      </ul>
      <h3 class="tasks-list-title">Completed</h3>
      <ul id="completed-tasks-list">
        <li class="task">
          <input type="checkbox" checked class="tasks-list-checkbox">
          <label class="task-name task-name-label">See the Doctor</label>
          <input type="text" class="task-name  task-name-input">
          <button class="btn edit-btn">Edit</button>
          <button class="btn delete-btn">
            <img src="./remove.svg" class="delete-btn-img">
          </button>
        </li>
      </ul>
    </div>
    <script src="app.js"></script>
  </body>
</html>
